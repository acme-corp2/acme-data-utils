# Acme Corp — acme-data-utils CI/CD Pipeline
# GitHub Actions + CloudSmith
#
# This workflow replicates the functionality of the original GitLab CI pipeline
# with improvements in security (OIDC authentication) and observability.
#
# Workflow stages:
#   1. build        - Build Python package
#   2. test         - Run test suite
#   3. publish-qa   - Publish to CloudSmith QA repository (main branch only)
#   4. promote-prod - Promote to production (manual approval required)

name: Build, Test, and Publish Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'        # trigger on version tags e.g. v1.2.3
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

# Required permissions for OIDC authentication
permissions:
  id-token: write  # Required to request OIDC token from GitHub
  contents: read
  pull-requests: write  # Required to comment on PRs
  actions: read    # Required to read workflow artifacts
  checks: write    # Required to publish test results

env:
  PYTHON_VERSION: "3.11"
  PACKAGE_NAME: "acme-data-utils"
  CLOUDSMITH_NAMESPACE: "acme-4ngc"  # synced from terraform output
  QA_REPO: "acme-pypi-qa"
  PROD_REPO: "acme-pypi-prod"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build
  # ---------------------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Resolve package version
        id: resolve_version
        run: |
          BASE_VERSION=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('acme-data-utils/setup.cfg'); print(c['metadata']['version'])")
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push: strip the leading 'v' and use as-is
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Regular push: append dev build number for uniqueness
            VERSION="${BASE_VERSION}.dev${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"
          # Patch setup.cfg so the built wheel carries this version
          sed -i "s/^version = .*/version = $VERSION/" acme-data-utils/setup.cfg

      - name: Build package
        run: |
          cd acme-data-utils
          python -m build
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: acme-data-utils/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stage 2: Test
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install package and test dependencies
        run: |
          pip install dist/*.whl
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd acme-data-utils
          pytest tests/ -v \
            --junitxml=../test-results.xml \
            --cov=acme_data_utils \
            --cov-report=term-missing \
            --cov-report=xml:../coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 7

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          check_name: Test Results

  # ---------------------------------------------------------------------------
  # Stage 3: Publish to QA
  # ---------------------------------------------------------------------------
  publish-qa:
    name: Publish to QA Repository
    runs-on: ubuntu-latest
    needs: test

    # Only run on main branch or version tags (not on PRs)
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'

    # Optional: Use environment for additional protection
    # environment: qa

    steps:
      - name: Checkout code (for version info)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Authenticate to CloudSmith via OIDC
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          oidc-namespace: ${{ env.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: 'github-actions-service-4aah'
          # Service slug must match Terraform output: github-actions-service-y7fn

      - name: Publish to QA repository
        run: |
          cloudsmith push python \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }} \
            dist/*.whl \
            --republish

          cloudsmith push python \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }} \
            dist/*.tar.gz \
            --republish

      - name: Get package version
        id: version
        run: |
          # Read version from the built wheel filename (e.g. acme_data_utils-0.1.0.dev5-py3-none-any.whl)
          WHL=$(ls dist/*.whl | head -1)
          VERSION=$(echo "$WHL" | sed 's/.*-\([0-9][^-]*\)-.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      # Note: PR comments are not added here because this job only runs on main branch
      # For PR-triggered builds, consider adding a separate notification job

      - name: Summary
        run: |
          echo "## ✅ Package Published to QA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: ${{ env.PACKAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ env.QA_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View in CloudSmith](https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.QA_REPO }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify package in QA repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Test package installation and functionality" >> $GITHUB_STEP_SUMMARY
          echo "3. Approve production promotion when ready" >> $GITHUB_STEP_SUMMARY

      - name: Notify team on Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Package Published to QA — Awaiting Approval"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Package:*\n`${{ env.PACKAGE_NAME }}`" },
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ steps.version.outputs.version }}`" },
                    { "type": "mrkdwn", "text": "*Repository:*\n`${{ env.QA_REPO }}`" },
                    { "type": "mrkdwn", "text": "*Commit:*\n`${{ github.sha }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Verify the package in QA, then trigger *Promote Package to Production* from the Actions tab when ready."
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View in CloudSmith QA" },
                      "url": "https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.QA_REPO }}/"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # ---------------------------------------------------------------------------
  # Stage 4: Manual Approval Gate (via Environment)
  # ---------------------------------------------------------------------------
  # This is handled by the 'production' environment configuration
  # Configure in: Settings > Environments > production
  # - Add required reviewers (DevOps team)
  # - Optional: Add deployment protection rules

  # ---------------------------------------------------------------------------
  # Stage 5: Promote to Production
  # ---------------------------------------------------------------------------
  promote-prod:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: publish-qa

    # Manual approval required via 'production' environment
    environment: production

    # Only run on main branch or version tags
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Authenticate to CloudSmith via OIDC
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          oidc-namespace: ${{ env.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: 'github-actions-service-4aah'

      - name: Get package version
        id: version
        run: |
          # Read version from the built wheel filename (e.g. acme_data_utils-0.1.0.dev5-py3-none-any.whl)
          WHL=$(ls dist/*.whl | head -1)
          VERSION=$(echo "$WHL" | sed 's/.*-\([0-9][^-]*\)-.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version to promote: $VERSION"

      - name: Promote package to production
        run: |
          echo "Promoting ${{ env.PACKAGE_NAME }} v${{ steps.version.outputs.version }} from QA to Production..."

          # Look up the unique identifier of the package in QA
          PKGS_JSON=$(cloudsmith list packages \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }} \
            -q "name:${{ env.PACKAGE_NAME }} version:${{ steps.version.outputs.version }}" \
            -F pretty_json)

          echo "Raw package query result: $PKGS_JSON"

          UNIQUE_IDS=$(echo "$PKGS_JSON" | python3 -c "
          import json, sys
          response = json.load(sys.stdin)
          pkgs = response.get('data', [])
          if not pkgs:
              print('ERROR: No packages found in QA', file=sys.stderr)
              sys.exit(1)
          for pkg in pkgs:
              print(pkg['slug_perm'])
          ")

          echo "Package unique IDs: $UNIQUE_IDS"

          # Move all packages (whl + tar.gz) from QA to Production
          for UNIQUE_ID in $UNIQUE_IDS; do
            echo "Moving package $UNIQUE_ID to production..."
            cloudsmith move \
              ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }}/$UNIQUE_ID \
              ${{ env.PROD_REPO }} \
              --yes
          done

          echo "All packages moved to production successfully!"


      - name: Summary
        run: |
          echo "## 🚀 Package Promoted to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: ${{ env.PACKAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ env.PROD_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View in CloudSmith](https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.PROD_REPO }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "The package is now available in production for all users." >> $GITHUB_STEP_SUMMARY

      - name: Notify team on Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Package Promoted to Production"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Package:*\n`${{ env.PACKAGE_NAME }}`" },
                    { "type": "mrkdwn", "text": "*Version:*\n`${{ steps.version.outputs.version }}`" },
                    { "type": "mrkdwn", "text": "*Repository:*\n`${{ env.PROD_REPO }}`" },
                    { "type": "mrkdwn", "text": "*Promoted by:*\n`${{ github.actor }}`" }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View in CloudSmith" },
                      "url": "https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.PROD_REPO }}/"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Workflow Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
