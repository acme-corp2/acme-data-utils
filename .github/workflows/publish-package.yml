# Acme Corp — acme-data-utils CI/CD Pipeline
# GitHub Actions + CloudSmith
#
# This workflow replicates the functionality of the original GitLab CI pipeline
# with improvements in security (OIDC authentication) and observability.
#
# Workflow stages:
#   1. build        - Build Python package
#   2. test         - Run test suite
#   3. publish-qa   - Publish to CloudSmith QA repository (main branch only)
#   4. promote-prod - Promote to production (manual approval required)

name: Build, Test, and Publish Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering

# Required permissions for OIDC authentication
permissions:
  id-token: write  # Required to request OIDC token from GitHub
  contents: read   # Required to checkout code
  pull-requests: write  # Required to comment on PRs
  actions: read    # Required to read workflow artifacts
  checks: write    # Required to publish test results

env:
  PYTHON_VERSION: "3.11"
  PACKAGE_NAME: "acme-data-utils"
  CLOUDSMITH_NAMESPACE: "acme"  # Update this with your CloudSmith org
  QA_REPO: "acme-pypi-qa"
  PROD_REPO: "acme-pypi-prod"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build
  # ---------------------------------------------------------------------------
  build:
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools

      - name: Build package
        run: |
          cd acme-data-utils
          python -m build
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: acme-data-utils/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stage 2: Test
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Install package and test dependencies
        run: |
          pip install dist/*.whl
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          cd acme-data-utils
          pytest tests/ -v \
            --junitxml=../test-results.xml \
            --cov=acme_data_utils \
            --cov-report=term-missing \
            --cov-report=xml:../coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
          retention-days: 7

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          check_name: Test Results

  # ---------------------------------------------------------------------------
  # Stage 3: Publish to QA
  # ---------------------------------------------------------------------------
  publish-qa:
    name: Publish to QA Repository
    runs-on: ubuntu-latest
    needs: test

    # Only run on main branch (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Optional: Use environment for additional protection
    # environment: qa

    steps:
      - name: Checkout code (for version info)
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Authenticate to CloudSmith via OIDC
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          oidc-namespace: ${{ env.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: 'github-actions-service'
          # Note: Ensure OIDC provider is configured in CloudSmith UI
          # with claims: repository, ref=refs/heads/main

      - name: Publish to QA repository
        run: |
          # The cloudsmith-cli is pre-installed and authenticated by the action above
          # CLOUDSMITH_API_KEY environment variable is automatically set

          cloudsmith push python \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }} \
            dist/*.whl \
            --republish \
            --tags "branch:main" \
            --tags "commit:${{ github.sha }}" \
            --tags "workflow:${{ github.run_id }}"

          cloudsmith push python \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }} \
            dist/*.tar.gz \
            --republish \
            --tags "branch:main" \
            --tags "commit:${{ github.sha }}" \
            --tags "workflow:${{ github.run_id }}"

      - name: Get package version
        id: version
        run: |
          cd acme-data-utils
          VERSION=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('setup.cfg'); print(c['metadata']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      # Note: PR comments are not added here because this job only runs on main branch
      # For PR-triggered builds, consider adding a separate notification job

      - name: Summary
        run: |
          echo "## ✅ Package Published to QA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: ${{ env.PACKAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ env.QA_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View in CloudSmith](https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.QA_REPO }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify package in QA repository" >> $GITHUB_STEP_SUMMARY
          echo "2. Test package installation and functionality" >> $GITHUB_STEP_SUMMARY
          echo "3. Approve production promotion when ready" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Stage 4: Manual Approval Gate (via Environment)
  # ---------------------------------------------------------------------------
  # This is handled by the 'production' environment configuration
  # Configure in: Settings > Environments > production
  # - Add required reviewers (DevOps team)
  # - Optional: Add deployment protection rules

  # ---------------------------------------------------------------------------
  # Stage 5: Promote to Production
  # ---------------------------------------------------------------------------
  promote-prod:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: publish-qa

    # Manual approval required via 'production' environment
    environment: production

    # Only run on main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Authenticate to CloudSmith via OIDC
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          oidc-namespace: ${{ env.CLOUDSMITH_NAMESPACE }}
          oidc-service-slug: 'github-actions-service'

      - name: Get package version
        id: version
        run: |
          cd acme-data-utils
          VERSION=$(python -c "import configparser; c = configparser.ConfigParser(); c.read('setup.cfg'); print(c['metadata']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version to promote: $VERSION"

      - name: Promote package to production
        run: |
          # Use CloudSmith copy command to promote from QA to Production
          # This maintains package immutability and provenance

          echo "Promoting ${{ env.PACKAGE_NAME }} v${{ steps.version.outputs.version }} from QA to Production..."

          # Copy wheel file
          cloudsmith copy python \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.QA_REPO }}/${{ env.PACKAGE_NAME }}/${{ steps.version.outputs.version }} \
            ${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.PROD_REPO }} \
            --wait \
            --tags "promoted:true" \
            --tags "promoted-from:qa" \
            --tags "promoted-by:github-actions" \
            --tags "workflow:${{ github.run_id }}"

          echo "✅ Package promoted to production successfully!"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 Release v${{ steps.version.outputs.version }}

            This release has been promoted to production.

            ### 📦 Package Information
            - **Package**: `${{ env.PACKAGE_NAME }}`
            - **Version**: `${{ steps.version.outputs.version }}`
            - **Repository**: `${{ env.PROD_REPO }}`

            ### 🔗 Links
            - [View in CloudSmith](https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.PROD_REPO }}/packages/detail/python/${{ env.PACKAGE_NAME }}/${{ steps.version.outputs.version }}/)
            - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### 📥 Installation
            ```bash
            pip install ${{ env.PACKAGE_NAME }}==${{ steps.version.outputs.version }} \
              --index-url https://dl.cloudsmith.io/basic/${{ env.CLOUDSMITH_NAMESPACE }}/${{ env.PROD_REPO }}/python/simple/
            ```

            ### 🔄 Changes
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## 🚀 Package Promoted to Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package**: ${{ env.PACKAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ env.PROD_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View in CloudSmith](https://cloudsmith.io/~${{ env.CLOUDSMITH_NAMESPACE }}/repos/${{ env.PROD_REPO }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "The package is now available in production for all users." >> $GITHUB_STEP_SUMMARY

      # Optional: Send notifications (uncomment and configure as needed)
      # - name: Notify team
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": "🚀 ${{ env.PACKAGE_NAME }} v${{ steps.version.outputs.version }} promoted to production!",
      #         "blocks": [
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "🚀 *${{ env.PACKAGE_NAME }}* v${{ steps.version.outputs.version }} promoted to production!"
      #             }
      #           }
      #         ]
      #       }
      #   env:
